# Prüft bei jedem Push, ob Daten und Build fehlerfrei sind (nur Kontrolle –
# veröffentlicht nichts; das Dashboard ist verschlüsselt in index.html).
name: Build & Datenprüfung
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dashboard bauen (Kontrolle)
        run: python3 build.py
      - name: Datenprüfung (Invarianten, Duplikate, Register-Kreuzcheck)
        run: python3 check_data.py
